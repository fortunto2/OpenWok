# Fly.io config for OpenWok — Dioxus 0.7 fullstack (SSR + WASM)
# Single Rust binary serves everything: SSR HTML + WASM hydration + API
app = "openwok"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/app/data/openwok.db"
  PORT = "3000"
  IP = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "openwok_data"
  destination = "/app/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
